<style>
    /* Kontejner menu */
    #menuItems {
        position: relative !important;
    }

    /* Plovoucí pilulka - ZÁKLADNÍ STAV */
    #sliding-pill {
        position: absolute;
        
        /* --- ZDE JE TVOJE NOVÁ BARVA --- */
        background-color: #4f3ef1; 
        
        border-radius: 0.5rem;
        
        /* Stín pro efekt levitace */
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -2px rgba(0, 0, 0, 0.3);
        
        /* Výchozí stav (neviditelná) */
        height: 0; width: 0; opacity: 0; top: 0; left: 0;
        
        /* Animace */
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1), transform 0.1s ease-in-out;
        z-index: 0;
        pointer-events: none;
    }

    /* Třída pro stav "ZMÁČKNUTÍ" */
    #sliding-pill.pill-pressed {
        transform: scale(0.95); 
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5); 
        transition: transform 0.1s ease-in-out;
    }

    /* Texty odkazů musí být nad pilulkou */
    .nav-item-text {
        position: relative;
        z-index: 10;
    }
</style>

<div class="top-0 z-50 w-full text-gray-200 bg-gray-950 border-b border-stone-200/10 md:sticky">
    <div x-data="{ open: false }" class="flex flex-col px-4 mx-auto max-w-full md:items-center md:justify-between md:flex-row md:px-6 lg:px-8">
        
        <div class="flex flex-row justify-between items-center p-4">
            <a href="/" class="flex text-gray-100 transition duration-300 ease-in-out group active:scale-95 transition-transform">
                <img src="/images/JH-logo.svg" class="w-9 h-9 transition-opacity group-hover:opacity-50" alt="Logo" />
                <div class="mt-1 ml-3 text-xl font-black tracking-tight text-gray-100 uppercase">
                    {{ with .Site.Params.siteLogoText }}{{ . }}{{ else }}{{ .Site.Title }}{{ end }}
                </div>
            </a>
            <button class="rounded-lg md:hidden focus:outline-none" @click="open = !open">
                <svg fill="currentColor" viewBox="0 0 20 20" class="w-6 h-6"><path x-show="!open" fill-rule="evenodd" d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 10a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM9 15a1 1 0 011-1h6a1 1 0 110 2h-6a1 1 0 01-1-1z" clip-rule="evenodd"></path><path x-show="open" fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"></path></svg>
            </button>
        </div>

        <nav id="menuItems" :class="{'flex': open, 'hidden': !open}" class="hidden flex-col flex-grow pb-4 md:pb-0 md:flex md:justify-end md:flex-row">
            
            <div id="sliding-pill"></div>

            {{ range site.Menus.main }}
            
            {{ if (eq "complexdropdown" .Pre) }}
            <div class="relative z-10" x-data="{ open: false }">
                <button @click="open = !open" class="nav-item nav-item-text flex items-center px-4 py-2 mt-2 font-semibold text-gray-100 rounded-lg md:mt-0 md:ml-4 hover:text-white focus:outline-none">
                    <span>{{ .Name }}</span>
                </button>
                 </div>

            {{ else }}
            <a class="nav-item nav-item-text px-4 py-2 mt-2 text-sm font-semibold rounded-lg md:mt-0 md:ml-4 text-gray-100 hover:text-white focus:outline-none" href="{{ .URL | relURL }}">
                {{ .Name }}
            </a>
            {{ end }}
            {{ end }}

            {{ if not .Site.Params.Disable_theme_toggle }}
            <button id="theme-toggle" class="nav-item p-2 text-sm text-gray-500 rounded-lg md:ml-2 transition-transform">
                <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
                <svg id="theme-toggle-light-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" fill-rule="evenodd" clip-rule="evenodd"></path></svg>
            </button>
            {{ end }}
        </nav>
    </div>
</div>

<script>
    window.addEventListener('load', () => {
        const pill = document.getElementById('sliding-pill');
        const navContainer = document.getElementById('menuItems');
        const navItems = document.querySelectorAll('.nav-item');

        const removePressEffect = () => {
            pill.classList.remove('pill-pressed');
        };

        navItems.forEach(item => {
            // Hover efekt
            item.addEventListener('mouseenter', (e) => {
                const target = e.currentTarget;
                const width = target.offsetWidth;
                const height = target.offsetHeight;
                const left = target.offsetLeft;
                const top = target.offsetTop;

                pill.style.width = `${width}px`;
                pill.style.height = `${height}px`;
                pill.style.left = `${left}px`;
                pill.style.top = `${top}px`;
                pill.style.opacity = '1';
            });

            // Click (Press) efekt
            item.addEventListener('mousedown', () => {
                pill.classList.add('pill-pressed');
            });

            item.addEventListener('mouseup', removePressEffect);
            item.addEventListener('mouseleave', removePressEffect);
        });

        // Reset při opuštění
        navContainer.addEventListener('mouseleave', () => {
            pill.style.opacity = '0';
            removePressEffect();
        });
    });
</script>
